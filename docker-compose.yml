services:
  sawt:
    image: ghcr.io/ajmandourah/sawt:latest
    container_name: sawt
    restart: unless-stopped
    ports:
      - "7071:7071"
    volumes:
      - ./music:/music:ro
      - ./data:/data
    environment:
      - SERVER=${MUMBLE_SERVER:-}
      - USERNAME=${MUMBLE_USERNAME:-Sawt Bot}
      - PASSWORD=${MUMBLE_PASSWORD:-}
      - CHANNEL=${MUMBLE_CHANNEL:-Music}
      - PREFIX=${MUMBLE_PREFIX:-!}
      - STEREO=${STEREO:-false}
      - JITTER=${JITTER:-false}
      - JITTER_DELAY=${JITTER_DELAY:-100}
      - BUFFER=${BUFFER:-128}
      - WEBUI_PORT=${WEBUI_PORT:-7071}
      - WEBUI_ADDR=${WEBUI_ADDR:-0.0.0.0}
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:7071/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
